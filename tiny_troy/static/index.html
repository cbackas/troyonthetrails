<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Rider</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: monospace;
            background: #f5f5f5;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 10px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }

        h1 {
            margin: 0;
            color: #333;
            font-size: 1.5em;
        }

        .game-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        canvas {
            border: 2px solid #333;
            background: #f0f0f0;
            display: block;
            width: 100%;
            height: 100%;
        }

        .footer {
            padding: 15px 20px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            text-align: center;
        }

        .info {
            color: #666;
            margin: 0;
            font-size: 0.95em;
        }

        .controls {
            margin-top: 5px;
            font-size: 0.85em;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Tiny Troy</h1>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="footer">
        <div class="info">
            <p>Ride down the hills and build up speed. Press SPACE to thrust down.</p>
            <div class="controls">
                Hold SPACE bar to accelerate downward | Survive the rolling terrain
            </div>
        </div>
    </div>

    <script type="module">
        // Import the WASM module
        import init, {Game} from '/tiny-troy/tiny_troy.js';

        async function run() {
            // Initialize WASM
            await init();

            // Create game instance
            let game = new Game();

            // Input handling
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    game.set_space_pressed(true);
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    game.set_space_pressed(false);
                }
            });

            // Game loop (60fps)
            function gameLoop() {
                game.update();
                game.render();
                requestAnimationFrame(gameLoop);
            }

            gameLoop();
        }

        run().catch(err => {
            console.error('Failed to initialize game:', err);
            alert('Failed to load game. Check console for details.');
        });
    </script>
</body>

</html>
