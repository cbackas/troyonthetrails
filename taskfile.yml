version: '3'
tasks:
  default:
    cmds:
      - task: dev
  tailwind-generate:
    dir: 'web_service'
    cmds:
      - npm run tailwind:generate
  build:
    deps: [build-tiny-troy]
    cmds:
      - cargo build
  build-tiny-troy:
    cmds:
      - wasm-pack build tiny_troy --release --target web --out-dir ../tiny_troy/static
  watch-tiny-troy:
    cmds:
      - cargo watch -w tiny_troy -s 'task build-tiny-troy'
  run-web:
    dir: 'web_service'
    cmds:
      - task: tailwind-generate
      - cargo run
  dev:
    aliases: [watch]
    cmds:
      - |
        cargo watch -w tiny_troy -s 'task build-tiny-troy' &
        cargo watch -s 'task run-web'
    env:
      RUST_BACKTRACE: 1
  deploy:
    cmds:
      - flyctl deploy
  stop-app:
    cmds:
      - flyctl scale count 0 -a troyonthetrails
  start-app:
    cmds:
      - flyctl scale count 1 -a troyonthetrails
  test:
    cmds:
      - cargo test -p integration_tests
